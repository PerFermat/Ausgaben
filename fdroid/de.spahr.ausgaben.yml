# F-Droid build recipe for Ausgaben (reference copy).
#
# This is the metadata that goes into the fdroiddata repository as
# metadata/de.spahr.ausgaben.yml (via a merge request), NOT into this app repo's build.
# It builds the GMS-free "foss" product flavor of the :app module. The Wear OS companion
# (:wear) needs Google Play Services and is intentionally NOT packaged for F-Droid.
#
# MPAndroidChart no longer comes from JitPack (which F-Droid does not allow): the app repo now
# vendors it as a git submodule (third_party/MPAndroidChart, pinned to tag v3.1.0) and builds it
# from source as the ':mpandroidchart' Gradle module (see mpandroidchart/build.gradle and
# app/build.gradle). No srclib entry or prebuild sed hack is needed any more — just make sure
# `submodules: yes` is set below so fdroidserver checks out the submodule too.
#
# Still to do before opening the MR:
#  - Point `commit:` at a tag that actually contains this fix (i.e. v1.3 or later, once tagged;
#    v1.2 still used the JitPack dependency and won't build without network access to JitPack).

Categories:
  - Money
License: GPL-3.0-only
AuthorName: Michael Spahr
SourceCode: https://github.com/PerFermat/Ausgaben
IssueTracker: https://github.com/PerFermat/Ausgaben/issues
Changelog: https://github.com/PerFermat/Ausgaben/releases

RepoType: git
Repo: https://github.com/PerFermat/Ausgaben.git

Builds:
  - versionName: "1.3"       # TODO: update once v1.3 (or later) is tagged
    versionCode: 4           # TODO: must match the tagged commit's app/build.gradle
    commit: v1.3             # TODO: this tag does not exist yet — replace before submitting
    subdir: app
    gradle:
      - foss
    submodules: yes
    # Output of :app:assembleFossRelease (unsigned; F-Droid signs it):
    # app/build/outputs/apk/foss/release/app-foss-release-unsigned.apk

AutoUpdateMode: Version v%v
UpdateCheckMode: Tags
CurrentVersion: "1.3"
CurrentVersionCode: 4
